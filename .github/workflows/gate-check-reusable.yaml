name: Gate Check (Reusable)

on:
  workflow_call:
    inputs:
      username:
        required: true
        type: string
      base-sha:
        required: true
        type: string
    outputs:
      allowed:
        description: "'true' if the contributor is allowed, 'false' otherwise"
        value: ${{ jobs.check.outputs.allowed }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      allowed: ${{ steps.gate.outputs.allowed }}
    steps:
      - id: gate
        uses: actions/github-script@v7
        env:
          USERNAME: ${{ inputs.username }}
          BASE_SHA: ${{ inputs.base-sha }}
        with:
          script: |
            const author = process.env.USERNAME;
            const baseSha = process.env.BASE_SHA;

            try {
              await github.rest.orgs.checkMembershipForUser({
                org: context.repo.owner,
                username: author,
              });
              core.setOutput('allowed', 'true');
              return;
            } catch (_) {}

            try {
              await github.rest.repos.checkCollaborator({
                ...context.repo,
                username: author,
              });
              core.setOutput('allowed', 'true');
              return;
            } catch (_) {}

            try {
              const { data } = await github.rest.repos.getContent({
                ...context.repo,
                path: 'contributors.txt',
                ref: baseSha,
              });
              const list = Buffer.from(data.content, 'base64').toString('utf8')
                .split('\n').map(s => s.trim().toLowerCase()).filter(Boolean);
              if (list.includes(author.toLowerCase())) {
                core.setOutput('allowed', 'true');
                return;
              }
            } catch (_) {}

            core.setOutput('allowed', 'false');
