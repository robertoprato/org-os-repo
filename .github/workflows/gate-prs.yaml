name: Gate PRs
on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited

permissions:
  pull-requests: write
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const allow = fs.readFileSync('contributors.txt', 'utf8')
              .split('\n').map(s => s.trim().toLowerCase()).filter(Boolean);
            const author = context.payload.pull_request.user.login.toLowerCase();
            if (allow.includes(author)) return;
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.payload.pull_request.number,
              body: `Thanks @${author}, but PRs are limited to approved contributors right now.`
            });
            await github.rest.pulls.update({
              ...context.repo, pull_number: context.payload.pull_request.number,
              state: 'closed'
            });